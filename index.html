<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jelly Tasks - Google Tasks Extension</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; margin: 0; padding: 20px;">
    <div style="max-width: 800px; margin: 0 auto; text-align: center;">
        <h1 style="color: #1a73e8;">Jelly Tasks</h1>
        
        <p style="font-size: 1.2em; margin: 20px 0;">
            A browser extension for quick access to Google Tasks
        </p>

        <div style="background-color: #f8f9fa; padding: 20px; border-radius: 8px; margin: 20px 0; text-align: left;">
            <h2>Privacy Information</h2>
            <p>This extension requires access to your Google Tasks data. Please review our privacy policy:</p>
            
            <div style="text-align: center; margin: 20px 0;">
                <a href="https://russile.github.io/JellyTasks/privacy_policy.html" 
                   style="display: inline-block; padding: 12px 24px; background-color: #1a73e8; color: white; 
                          text-decoration: none; border-radius: 4px; font-weight: bold;">
                    View Privacy Policy
                </a>
            </div>
        </div>

        <div style="margin-top: 20px;">
            <a href="https://github.com/Russile/JellyTasks" 
               style="color: #1a73e8; text-decoration: none;">
                GitHub Repository
            </a>
        </div>
    </div>
</body>
</html>
